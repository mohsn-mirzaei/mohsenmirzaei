<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" font-family="ui-monospace,Menlo,monospace">
<rect width="1600" height="1000" fill="#08080a"/>
<defs><marker id="ah" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0L8,3L0,6Z" fill="#82827c"/></marker></defs><text x="80" y="90" fill="#d6ff3f" font-size="16" text-anchor="start" letter-spacing="3">REF-COUNTED WEBSOCKET LAYER</text><rect x="80" y="160" width="280" height="90" rx="12" fill="#141418" stroke="rgba(245,245,240,0.10)"/><text x="220" y="199" fill="#ededed" font-size="15" text-anchor="middle" letter-spacing="1">orderbook stream</text><text x="220" y="221" fill="#82827c" font-size="11" text-anchor="middle" letter-spacing="1">wss://</text><line x1="360" y1="205" x2="480" y2="360" stroke="rgba(245,245,240,0.2)" stroke-width="1.6" marker-end="url(#ah)"/><rect x="80" y="290" width="280" height="90" rx="12" fill="#141418" stroke="rgba(245,245,240,0.10)"/><text x="220" y="329" fill="#ededed" font-size="15" text-anchor="middle" letter-spacing="1">trades stream</text><text x="220" y="351" fill="#82827c" font-size="11" text-anchor="middle" letter-spacing="1">wss://</text><line x1="360" y1="335" x2="480" y2="380" stroke="rgba(245,245,240,0.2)" stroke-width="1.6" marker-end="url(#ah)"/><rect x="80" y="420" width="280" height="90" rx="12" fill="#141418" stroke="rgba(245,245,240,0.10)"/><text x="220" y="459" fill="#ededed" font-size="15" text-anchor="middle" letter-spacing="1">ticker stream</text><text x="220" y="481" fill="#82827c" font-size="11" text-anchor="middle" letter-spacing="1">wss://</text><line x1="360" y1="465" x2="480" y2="400" stroke="rgba(245,245,240,0.2)" stroke-width="1.6" marker-end="url(#ah)"/><rect x="480" y="300" width="320" height="180" rx="12" fill="#141418" stroke="rgba(245,245,240,0.10)"/><text x="640" y="384" fill="#ededed" font-size="15" text-anchor="middle" letter-spacing="1">Socket Manager</text><text x="640" y="406" fill="#82827c" font-size="11" text-anchor="middle" letter-spacing="1">ref-counted subscriptions · reconnect</text><line x1="800" y1="390" x2="920" y2="390" stroke="rgba(245,245,240,0.2)" stroke-width="1.6" marker-end="url(#ah)"/><rect x="920" y="300" width="300" height="180" rx="12" fill="#141418" stroke="rgba(245,245,240,0.10)"/><text x="1070" y="384" fill="#ededed" font-size="15" text-anchor="middle" letter-spacing="1">Normalized Cache</text><text x="1070" y="406" fill="#82827c" font-size="11" text-anchor="middle" letter-spacing="1">throttled patches · 200–300ms</text><line x1="1220" y1="390" x2="1330" y2="390" stroke="rgba(245,245,240,0.2)" stroke-width="1.6" marker-end="url(#ah)"/><rect x="1330" y="160" width="200" height="90" rx="12" fill="#141418" stroke="rgba(245,245,240,0.10)"/><text x="1430" y="199" fill="#d6ff3f" font-size="15" text-anchor="middle" letter-spacing="1">Order Book</text><rect x="1330" y="300" width="200" height="90" rx="12" fill="#141418" stroke="rgba(245,245,240,0.10)"/><text x="1430" y="339" fill="#d6ff3f" font-size="15" text-anchor="middle" letter-spacing="1">Chart</text><rect x="1330" y="440" width="200" height="90" rx="12" fill="#141418" stroke="rgba(245,245,240,0.10)"/><text x="1430" y="479" fill="#d6ff3f" font-size="15" text-anchor="middle" letter-spacing="1">Ticker</text><line x1="1220" y1="350" x2="1330" y2="205" stroke="rgba(245,245,240,0.2)" stroke-width="1.6" marker-end="url(#ah)"/><line x1="1220" y1="430" x2="1330" y2="485" stroke="rgba(245,245,240,0.2)" stroke-width="1.6" marker-end="url(#ah)"/><rect x="80" y="620" width="1450" height="280" rx="16" fill="#0e0e11" stroke="rgba(245,245,240,0.10)"/><text x="120" y="672" fill="#82827c" font-size="14" text-anchor="start" letter-spacing="1">subscribe(topic) → refCount += 1 · first subscriber opens upstream · last unsubscribe tears down</text><text x="120" y="712" fill="#82827c" font-size="14" text-anchor="start" letter-spacing="1">ticks patch cache, never React state · one flush per topic per window</text><text x="120" y="752" fill="#82827c" font-size="14" text-anchor="start" letter-spacing="1">reconnect walks the registry and replays every topic with refCount &gt; 0</text><rect x="120" y="790" width="900" height="8" rx="5" fill="#191920"/><rect x="120" y="815" width="700" height="8" rx="5" fill="#191920"/><rect x="120" y="840" width="800" height="8" rx="5" fill="#191920"/>
