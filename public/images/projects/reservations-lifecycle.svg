<defs><marker id="ah3" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0L8,3L0,6Z" fill="#82827c"/></marker></defs><text x="80" y="90" fill="#d6ff3f" font-size="16" text-anchor="start" letter-spacing="3">RESERVATION LIFECYCLE · 8 STATES</text><rect x="150" y="230" width="180" height="60" rx="30" fill="#141418" stroke="rgba(245,245,240,0.10)"/><text x="240" y="265" fill="#ededed" font-size="14" text-anchor="middle" letter-spacing="1">draft</text><rect x="470" y="230" width="180" height="60" rx="30" fill="#141418" stroke="rgba(214,255,63,0.4)"/><text x="560" y="265" fill="#d6ff3f" font-size="14" text-anchor="middle" letter-spacing="1">pending</text><rect x="790" y="230" width="180" height="60" rx="30" fill="#141418" stroke="rgba(214,255,63,0.4)"/><text x="880" y="265" fill="#d6ff3f" font-size="14" text-anchor="middle" letter-spacing="1">confirmed</text><rect x="1110" y="230" width="180" height="60" rx="30" fill="#141418" stroke="rgba(245,245,240,0.10)"/><text x="1200" y="265" fill="#3fd68b" font-size="14" text-anchor="middle" letter-spacing="1">fulfilled</text><rect x="470" y="470" width="180" height="60" rx="30" fill="#141418" stroke="rgba(245,245,240,0.10)"/><text x="560" y="505" fill="#82827c" font-size="14" text-anchor="middle" letter-spacing="1">expired</text><rect x="790" y="470" width="180" height="60" rx="30" fill="#141418" stroke="rgba(245,245,240,0.10)"/><text x="880" y="505" fill="#ff5e5e" font-size="14" text-anchor="middle" letter-spacing="1">cancelled</text><rect x="1110" y="470" width="180" height="60" rx="30" fill="#141418" stroke="rgba(245,245,240,0.10)"/><text x="1200" y="505" fill="#ff5e5e" font-size="14" text-anchor="middle" letter-spacing="1">no_show</text><rect x="150" y="470" width="180" height="60" rx="30" fill="#141418" stroke="rgba(245,245,240,0.10)"/><text x="240" y="505" fill="#82827c" font-size="14" text-anchor="middle" letter-spacing="1">refunded</text><line x1="330" y1="260" x2="470" y2="260" stroke="rgba(245,245,240,0.2)" stroke-width="1.6"  marker-end="url(#ah3)"/><line x1="650" y1="260" x2="790" y2="260" stroke="rgba(245,245,240,0.2)" stroke-width="1.6"  marker-end="url(#ah3)"/><line x1="970" y1="260" x2="1110" y2="260" stroke="rgba(245,245,240,0.2)" stroke-width="1.6"  marker-end="url(#ah3)"/><line x1="560" y1="290" x2="560" y2="470" stroke="rgba(245,245,240,0.2)" stroke-width="1.6" stroke-dasharray="4 6" marker-end="url(#ah3)"/><line x1="610" y1="290" x2="830" y2="470" stroke="rgba(245,245,240,0.2)" stroke-width="1.6" stroke-dasharray="4 6" marker-end="url(#ah3)"/><line x1="930" y1="290" x2="1150" y2="470" stroke="rgba(245,245,240,0.2)" stroke-width="1.6" stroke-dasharray="4 6" marker-end="url(#ah3)"/><line x1="790" y1="500" x2="330" y2="500" stroke="rgba(245,245,240,0.2)" stroke-width="1.6" stroke-dasharray="4 6" marker-end="url(#ah3)"/><text x="80" y="660" fill="#82827c" font-size="14" text-anchor="start" letter-spacing="1">every transition validated at the API boundary — anything not enumerated is rejected</text><rect x="80" y="700" width="1440" height="220" rx="16" fill="#0e0e11" stroke="rgba(245,245,240,0.10)"/><text x="120" y="748" fill="#ededed" font-size="14" text-anchor="start" letter-spacing="1">BEGIN;  SELECT ... FOR UPDATE;  -- lock the slot row</text><text x="120" y="788" fill="#82827c" font-size="14" text-anchor="start" letter-spacing="1">-- re-check availability under the lock</text><text x="120" y="828" fill="#ededed" font-size="14" text-anchor="start" letter-spacing="1">INSERT reservation; UPDATE slot;  COMMIT;</text><text x="120" y="878" fill="#d6ff3f" font-size="13" text-anchor="start" letter-spacing="1">two racing requests serialize at the database — the second sees the slot taken</text>
